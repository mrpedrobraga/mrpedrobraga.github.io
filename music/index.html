<!DOCTYPE html>
<html lang="en">
<head>
	<!--Information-->
	<title>Discography | mrpedrobraga</title>

	<!--Metadata-->
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<!--CSS Normalization-->
	<link rel="stylesheet" type="text/less" href="../_styles/normalize.css"/>

	<!--Styling-->
	<link href="http://fonts.cdnfonts.com/css/cascadia-code" rel="stylesheet">
	<link rel="stylesheet/less" type="text/css" href="../_styles/starch_main.less"/>
    <link rel="icon" type="image/x-icon" href="../_assets/img/profile_picture.jpg" />

    <!-- Music Player -->
    <link rel="stylesheet/less" type="text/css" href="music_player.less"/>
    <script src="music_player.js" defer></script>
</head>
<body class="dark">
    <!--Extension: LESS; for better styling!!!-->
    <script src="../_extensions/less.js" ></script>

    <div class="bg back" onContextMenu="return false;"></div>

    <a class="contact-icon return" style="position: fixed; top:8px; left:8px;" href="../#main-nav">
        <img src="../_assets/icons/back-arrow-icon.svg" alt="Go Back">
    </a>

    <div class="bbg"></div>

    <!-- MUSIC PLAYER!!! -->
    <div class="mplayer-container flex" id="player-container">
        <div class="flex vert expand">
            <div class="expand"></div>
            <div class="flex h" id="music-player-controls">
                <div class="button" id="play"></div>
                <div id="music-player-track" class="expand">
                    <div class="music-player-track-line">
                        <div id="music-player-track-progress"></div>
                    </div>
                </div>
                <div id="track-time">00:00 / 00:00</div>
                <div class="button disabled" id="mute"></div>
                <div class="button disabled" id="shuffle"></div>
            </div>
        </div>
    </div>
</body>
</html>
